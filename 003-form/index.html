<!-- @format -->

<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Front Blocks - Formulaire</title>
		<link rel="stylesheet" href="../global.css" />
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<!--
        form de contact
        prenom nom
        email
        objet
        message
        Combien font 4 + 8
        case ; j'accepte que mon email soit
        stocké pour apporter une réponse

        j'envoie le message
        
        -->

		<header>
			<h1>Formulaire de contact</h1>
		</header>
		<form>
			<div class="form-group">
				<label for="firstname">Prénom</label>
				<input type="text" id="firstname" />
			</div>
			<div class="form-group">
				<label for="name">Nom</label>
				<input type="text" id="name" />
			</div>
			<div class="form-group">
				<label for="email">Email</label>
				<input type="email" id="email" />
			</div>
			<div class="form-group">
				<label for="subject">Objet</label>
				<input type="text" id="subject" />
			</div>
			<div class="form-group">
				<label for="message">Message</label>
				<textarea id="message"></textarea>
			</div>
			<div class="form-group">
				<label for="verification">Combien font 4 + 8 ?</label>
				<input type="number" id="verification" />
			</div>
			<div class="form-group">
				<label for="accept"
					>J'accepte que mon email soit stocké pour apporter une réponse</label
				>
				<input type="checkbox" id="accept" />
			</div>
			<div class="form-group">
				<button type="submit">J'envoie mon message</button>
			</div>
		</form>
	</body>
</html>
